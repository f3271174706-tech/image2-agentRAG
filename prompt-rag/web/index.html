// ═══ Utility Functions ═══
const translationRequests = new Map();
const analysisRequests = new Map();

function escapeHTML(value) {
  return String(value || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

async function fetchPromptTranslation(promptId, forceRetry = false) {
  if (forceRetry) translationRequests.delete(promptId);
  if (!translationRequests.has(promptId)) {
    const request = fetch('/api/translate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt_id: promptId, target_language: 'zh' })
    }).then(async response => {
      const data = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(data.detail || '翻译请求失败');
      return data.translation;
    }).catch(error => {
      translationRequests.delete(promptId);
      throw error;
    });
    translationRequests.set(promptId, request);
  }
  return translationRequests.get(promptId);
}

async function translatePrimaryPrompt(messageElement, promptId, forceRetry = false) {
  const card = Array.from(messageElement.querySelectorAll('.prompt-card'))
    .find(item => item.dataset.promptId === promptId);
  if (!card) return;
  const button = Array.from(card.querySelectorAll('.translation-btn'))
    .find(item => !item.classList.contains('expand-prompt-btn'));
  if (button) await showCardTranslation(card, button, forceRetry);
}

function focusButtonIcon(focused) {
  return focused
    ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 3v6H3M15 3v6h6M9 21v-6H3M15 21v-6h6"/></svg>'
    : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M8 3H3v5M16 3h5v5M8 21H3v-5M16 21h5v-5"/></svg>';
}

function focusPromptCard(button) {
  const card = button.closest('.prompt-card');
  const grid = button.closest('.prompt-cards-grid');
  if (!card || !grid) return;
  const cards = Array.from(grid.querySelectorAll('.prompt-card'));
  const shouldReset = card.classList.contains('is-focused');

  grid.classList.toggle('focus-mode', !shouldReset);
  cards.forEach(item => {
    const isFocused = !shouldReset && item === card;
    const isCompact = !shouldReset && item !== card;
    item.classList.toggle('is-focused', isFocused);
    item.classList.toggle('is-compact', isCompact);
    item.setAttribute('role', isCompact ? 'button' : 'article');
    item.tabIndex = isCompact ? 0 : -1;
    const focusButton = item.querySelector('.focus-card-btn');
    if (focusButton) {
      focusButton.innerHTML = focusButtonIcon(isFocused);
      focusButton.setAttribute('aria-pressed', String(isFocused));
      focusButton.setAttribute('aria-label', isFocused ? '恢复三卡布局' : '放大为主卡片');
      focusButton.title = isFocused ? '恢复三卡布局' : '放大为主卡片';
    }
  });
  if (!shouldReset) {
    setTimeout(() => card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 60);
  }
}

function activateCompactCard(event, card) {
  if (!card.classList.contains('is-compact') || event.target.closest('button')) return;
  const button = card.querySelector('.focus-card-btn');
  if (button) focusPromptCard(button);
}

function activateCompactCardByKeyboard(event, card) {
  if (!card.classList.contains('is-compact') || !['Enter', ' '].includes(event.key)) return;
  event.preventDefault();
  const button = card.querySelector('.focus-card-btn');
  if (button) focusPromptCard(button);
}

async function showCardTranslation(card, button, forceRetry = false) {
  const translated = card.querySelector('.prompt-translation');
  const label = card.querySelector('.prompt-translation-label');
  button.disabled = true;
  button.textContent = '翻译中…';
  try {
    const translation = await fetchPromptTranslation(card.dataset.promptId, forceRetry);
    translated.innerHTML = formatContent(translation);
    translated.dataset.loaded = 'true';
    translated.classList.remove('hidden');
    label.classList.remove('hidden');
    card.dataset.translationVisible = 'true';
    button.textContent = '隐藏中文';
    gsap.fromTo(
      [label, translated],
      { opacity: 0, y: -6 },
      { opacity: 1, y: 0, duration: 0.32, stagger: 0.05, ease: 'power2.out', clearProps: 'transform,opacity' }
    );
    scrollToBottom();
  } catch (error) {
    button.textContent = '重新翻译';
    showToast('翻译失败：' + error.message, 'error');
  } finally {
    button.disabled = false;
  }
}

function togglePromptExpansion(button) {
  const card = button.closest('.prompt-card');
  const original = card?.querySelector('.prompt-original');
  const dialog = document.getElementById('originalPromptDialog');
  const content = document.getElementById('originalPromptDialogContent');
  const title = document.getElementById('originalPromptDialogTitle');
  if (!original || !dialog || !content || !title) return;

  title.textContent = card.querySelector('.prompt-card-title')?.textContent || '候选提示词';
  content.innerHTML = original.innerHTML;
  content.scrollTop = 0;
  if (!dialog.open) dialog.showModal();
  requestAnimationFrame(() => content.focus({ preventScroll: true }));
}

function closeOriginalPromptDialog() {
  const dialog = document.getElementById('originalPromptDialog');
  if (dialog?.open) dialog.close();
}

async function copyOriginalPrompt() {
  const content = document.getElementById('originalPromptDialogContent');
  if (!content) return;
  const text = content.innerText;
  try {
    await navigator.clipboard.writeText(text);
    showToast('完整原文已复制', 'success');
  } catch {
    const textarea = document.createElement('textarea');
    textarea.value = text;
    textarea.style.position = 'fixed';
    textarea.style.opacity = '0';
    document.body.appendChild(textarea);
    textarea.select();
    document.execCommand('copy');
    textarea.remove();
    showToast('完整原文已复制', 'success');
  }
}

async function toggleDocumentTranslation(button) {
  const card = button.closest('.prompt-card');
  if (!card) return;
  const translated = card.querySelector('.prompt-translation');
  const label = card.querySelector('.prompt-translation-label');

  if (card.dataset.translationVisible === 'true') {
    card.dataset.translationVisible = 'false';
    button.textContent = '查看中文';
    gsap.to([translated, label], {
      opacity: 0,
      y: -5,
      duration: 0.24,
      stagger: 0.03,
      ease: 'power2.in',
      onComplete: () => {
        translated.classList.add('hidden');
        label.classList.add('hidden');
        gsap.set([translated, label], { clearProps: 'transform,opacity' });
      }
    });
    return;
  }

  if (translated.dataset.loaded === 'true') {
    translated.classList.remove('hidden');
    label.classList.remove('hidden');
    card.dataset.translationVisible = 'true';
    button.textContent = '隐藏中文';
    gsap.fromTo(
      [label, translated],
      { opacity: 0, y: -5 },
      { opacity: 1, y: 0, duration: 0.28, stagger: 0.04, ease: 'power2.out', clearProps: 'transform,opacity' }
    );
    return;
  }

  await showCardTranslation(card, button);
}

async function analyzeCandidateCards(messageElement, query, promptIds) {
  const key = JSON.stringify([query, promptIds]);
  if (!analysisRequests.has(key)) {
    const request = fetch('/api/analyze-results', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query, prompt_ids: promptIds })
    }).then(async response => {
      const data = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(data.detail || '智能分析失败');
      return data;
    }).catch(error => {
      analysisRequests.delete(key);
      throw error;
    });
    analysisRequests.set(key, request);
  }

  const summary = messageElement.querySelector('.candidate-analysis-summary');
  try {
    const analysis = await analysisRequests.get(key);
    if (summary) {
      summary.textContent = analysis.summary;
      gsap.fromTo(summary, { opacity: 0.4, y: -5 }, { opacity: 1, y: 0, duration: 0.38, ease: 'power2.out' });
    }
    for (const item of analysis.cards || []) {
      const card = Array.from(messageElement.querySelectorAll('.prompt-card'))
        .find(element => element.dataset.promptId === item.prompt_id);
      if (!card) continue;
      const fields = [
        ['.prompt-card-title', item.personalized_title],
        ['.analysis-reason', item.match_reason],
        ['.analysis-best-for', item.best_for],
        ['.analysis-tip', item.adaptation_tip]
      ];
      for (const [selector, value] of fields) {
        const element = card.querySelector(selector);
        if (element) {
          gsap.killTweensOf(element);
          element.textContent = value || '';
          element.classList.remove('loading');
          gsap.fromTo(element, { opacity: 0, y: 4 }, { opacity: 1, y: 0, duration: 0.3, ease: 'power2.out' });
        }
      }
    }
  } catch (error) {
    if (summary) summary.textContent = '智能分析暂时失败，仍可直接查看和翻译候选提示词。';
    messageElement.querySelectorAll('.analysis-value.loading').forEach((element, index) => {
      const fallbacks = [
        '该候选由混合检索召回，与需求关键词相关。',
        '适合作为当前需求的基础图像模板。',
        '可替换主体、场景和风格参数进一步定制。'
      ];
      element.textContent = fallbacks[index % 3];
      element.classList.remove('loading');
    });
  }
}

function formatContent(content) {
  return escapeHTML(content)
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>')
    .replace(/📚 基于知识库回答：/g, '<span style="color: rgba(0,128,0,0.7);">📚 基于知识库回答：</span>')
    .replace(/📚 知识库信息有限，结合通用知识回答：/g, '<span style="color: rgba(200,150,0,0.7);">📚 知识库信息有限，结合通用知识回答：</span>')
    .replace(/🤖 基于 AI 通用知识回答：/g, '<span style="color: rgba(0,100,200,0.7);"><img src="/static/ai-avatar.jpg" alt="AI" style="width:16px;height:16px;border-radius:4px;vertical-align:middle;margin-right:4px;object-fit:cover;">基于 AI 通用知识回答：</span>');
}

function switchResponseLanguage(language) {
  currentLanguage = language === 'en' ? 'en' : 'zh';
  localStorage.setItem('prompt_rag_language', currentLanguage);
  applyLanguageUI(true);
}

function applyLanguageUI(notify) {
  const isChinese = currentLanguage === 'zh';
  const label = document.getElementById('responseLanguageLabel');
  const welcomeInput = document.getElementById('questionInput');
  const chatInput = document.getElementById('chatInput');
  if (label) label.textContent = isChinese ? '回答语言' : 'Response';
  if (welcomeInput) welcomeInput.placeholder = isChinese ? '输入你的图片需求...' : 'Describe the image you need...';
  if (chatInput) chatInput.placeholder = isChinese ? '继续描述你的需求...' : 'Refine your request...';
  if (notify) showToast(isChinese ? '回答语言已切换为中文' : 'Response language switched to English', 'success');
}

function formatTime(timestamp) {
  if (!timestamp) return '';
  const date = new Date(timestamp);
  const now = new Date();
  const diff = now - date;

  if (diff < 60000) return '刚刚';
  if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前';
  if (diff < 86400000) return Math.floor(diff / 3600000) + '小时前';

  return date.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
}

function scrollToBottom() {
  const container = document.getElementById('chatContainer');
  if (container) {
    container.scrollTop = container.scrollHeight;
  }
}

function showToast(msg, type) {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = `toast-widget text-xs px-4 py-3 rounded-[20px] ${type === 'error' ? 'text-red-600/80' : 'text-emerald-600/80'}`;
  t.textContent = msg;
  c.appendChild(t);
  gsap.fromTo(t, { opacity: 0, y: -12, scale: 0.96 }, { opacity: 1, y: 0, scale: 1, duration: 0.35, ease: 'power3.out' });
  setTimeout(() => {
    gsap.to(t, { opacity: 0, y: -12, scale: 0.96, duration: 0.25, ease: 'power3.in', onComplete: () => t.remove() });
  }, 2800);
}

// ═══ Recent History Dropdown ═══
let recentHistoryOpen = false;

function toggleRecentHistory() {
  recentHistoryOpen = !recentHistoryOpen;
  const dropdown = document.getElementById('recentHistoryDropdown');

  if (recentHistoryOpen) {
    renderRecentHistory();
    dropdown.classList.add('visible');

    // GSAP animation
    gsap.fromTo(dropdown, {
      opacity: 0,
      y: -10,
      scale: 0.95
    }, {
      opacity: 1,
      y: 0,
      scale: 1,
      duration: 0.2,
      ease: 'power2.out'
    });
  } else {
    gsap.to(dropdown, {
      opacity: 0,
      y: -10,
      scale: 0.95,
      duration: 0.15,
      ease: 'power2.in',
      onComplete: () => dropdown.classList.remove('visible')
    });
  }
}

function renderRecentHistory() {
  const container = document.getElementById('recentHistoryList');
  const sorted = Object.values(conversations)
    .sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt))
    .slice(0, 3);

  if (sorted.length === 0) {
    container.innerHTML = '<div class="recent-history-empty">暂无对话历史</div>';
    return;
  }

  container.innerHTML = sorted.map(conv => `
    <div class="recent-history-item" onclick="loadConversation('${conv.id}'); toggleRecentHistory();">
      <div class="recent-history-item-avatar">💬</div>
      <div class="recent-history-item-content">
        <div class="recent-history-item-title">${conv.title}</div>
        <div class="recent-history-item-time">${formatTime(conv.createdAt)}</div>
      </div>
    </div>
  `).join('');
}

// Close dropdown when clicking outside
document.addEventListener('click', (e) => {
  if (recentHistoryOpen && !e.target.closest('.collapsed-icon-wrapper')) {
    recentHistoryOpen = false;
    const dropdown = document.getElementById('recentHistoryDropdown');
    gsap.to(dropdown, {
      opacity: 0,
      y: -10,
      scale: 0.95,
      duration: 0.15,
      ease: 'power2.in',
      onComplete: () => dropdown.classList.remove('visible')
    });
  }
});

// ═══ Mode Switching ═══
let currentMode = 'smart'; // 'smart' or 'knowledge'

function switchMode(mode) {
  if (mode === currentMode) return;

  currentMode = mode;
  const slider = document.getElementById('modeSlider');
  const modeTextLarge = document.getElementById('modeTextLarge');
  const smartBtn = document.getElementById('modeSmart');
  const knowledgeBtn = document.getElementById('modeKnowledge');

  // Update slider position with GSAP
  if (mode === 'knowledge') {
    slider.classList.add('knowledge');
    gsap.to(slider, {
      x: '100%',
      duration: 0.3,
      ease: 'power2.out'
    });
  } else {
    slider.classList.remove('knowledge');
    gsap.to(slider, {
      x: '0%',
      duration: 0.3,
      ease: 'power2.out'
    });
  }

  // Update button states
  smartBtn.classList.toggle('active', mode === 'smart');
  knowledgeBtn.classList.toggle('active', mode === 'knowledge');

  // Update large mode text with animation
  gsap.to(modeTextLarge, {
    opacity: 0,
    y: -15,
    scale: 0.95,
    duration: 0.2,
    ease: 'power2.in',
    onComplete: () => {
      modeTextLarge.textContent = mode === 'smart' ? '使用智能模式开始对话' : '使用知识库模式开始对话';
      gsap.to(modeTextLarge, {
        opacity: 1,
        y: 0,
        scale: 1,
        duration: 0.25,
        ease: 'back.out(1.5)'
      });
    }
  });

  // Show toast
  showToast(mode === 'smart' ? '已切换到智能模式' : '已切换到知识库模式', 'success');
}

// ═══ Toggle Functions ═══
function syncButtonStates() {
  // 同步深度思考按钮
  document.querySelectorAll('.input-action-btn[onclick*="toggleDeepThink"]').forEach(b => {
    b.classList.toggle('active', deepThinkEnabled);
  });
  // 同步联网搜索按钮
  document.querySelectorAll('.input-action-btn[onclick*="toggleWebSearch"]').forEach(b => {
    b.classList.toggle('active', webSearchEnabled);
  });
}

function toggleDeepThink(btn) {
  deepThinkEnabled = !deepThinkEnabled;
  syncButtonStates();
  showToast(deepThinkEnabled ? '已开启深度思考（完整分析流程）' : '已关闭深度思考（快速响应模式）', 'success');
}

function toggleWebSearch(btn) {
  webSearchEnabled = !webSearchEnabled;
  syncButtonStates();
  showToast(webSearchEnabled ? '已开启联网搜索' : '已关闭联网搜索', 'success');
}

function toggleMultimodal(btn) {
  // 触发隐藏的文件上传 input
  let input = document.getElementById('multimodalUpload');
  if (!input) {
    input = document.createElement('input');
    input.type = 'file';
    input.id = 'multimodalUpload';
    input.accept = 'image/*,.pdf,.doc,.docx,.txt,.md';
    input.style.display = 'none';
    input.onchange = handleFileSelect;
    document.body.appendChild(input);
  }
  input.click();
}

function handleFileSelect(e) {
  const file = e.target.files[0];
  if (!file) return;

  selectedFile = file;
  showFilePreview(file);
  e.target.value = ''; // 清空 input 允许重复选择同一文件
}

function showFilePreview(file) {
  const isImage = file.type.startsWith('image/');
  const welcomePreview = document.getElementById('welcomeFilePreview');
  const chatPreview = document.getElementById('chatFilePreview');

  // 更新两个预览区域
  [welcomePreview, chatPreview].forEach(preview => {
    if (!preview) return;

    const thumbEl = preview.querySelector('[id$="FileThumb"]');
    const nameEl = preview.querySelector('[id$="FileName"]');
    const sizeEl = preview.querySelector('[id$="FileSize"]');

    // 设置缩略图
    if (isImage) {
      const url = URL.createObjectURL(file);
      thumbEl.innerHTML = `<img src="${url}" class="file-preview-thumb" alt="预览">`;
    } else {
      const ext = file.name.split('.').pop().toUpperCase();
      thumbEl.innerHTML = `<div class="file-preview-icon">📄</div>`;
    }

    // 设置文件信息
    nameEl.textContent = file.name;
    sizeEl.textContent = formatFileSize(file.size);

    // 显示预览
    preview.classList.add('has-file');
  });

  // 自动聚焦输入框
  const questionInput = document.getElementById('questionInput');
  const chatInput = document.getElementById('chatInput');
  if (questionInput && !questionInput.closest('.hidden')) {
    questionInput.focus();
  } else if (chatInput && !chatInput.closest('.hidden')) {
    chatInput.focus();
  }
}

function removeSelectedFile(context) {
  selectedFile = null;

  const welcomePreview = document.getElementById('welcomeFilePreview');
  const chatPreview = document.getElementById('chatFilePreview');

  welcomePreview.classList.remove('has-file');
  chatPreview.classList.remove('has-file');

  // 清理缩略图
  document.getElementById('welcomeFileThumb').innerHTML = '';
  document.getElementById('chatFileThumb').innerHTML = '';
}

function formatFileSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
}

function autoResizeTextarea(textarea) {
  textarea.style.height = 'auto';
  textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px';
}

// ═══ Initialize ═══
init();
</script>
